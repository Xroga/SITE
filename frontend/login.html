<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to Xroga AI</title>
    <style>
        body { font-family: system-ui, 'Segoe UI', Roboto, sans-serif; background: radial-gradient(circle at 10% 20%, #0f172a, #1e1b4b); min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; padding: 1rem; }
        .container { max-width: 400px; width: 100%; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 1.5rem; padding: 2rem; border: 1px solid rgba(255,255,255,0.1); }
        h2 { color: white; text-align: center; margin-bottom: 0.5rem; }
        .sub { text-align: center; color: #9ca3af; margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; color: #e5e7eb; font-size: 0.875rem; margin-bottom: 0.25rem; }
        input { width: 100%; padding: 0.75rem 1rem; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 0.75rem; color: white; font-size: 1rem; transition: 0.2s; }
        input:focus { outline: none; border-color: #3b82f6; background: rgba(255,255,255,0.12); }
        button { width: 100%; background: #2563eb; color: white; font-weight: 600; padding: 0.75rem; border: none; border-radius: 0.75rem; font-size: 1rem; cursor: pointer; margin-top: 0.5rem; transition: 0.2s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-outline { background: transparent; border: 1px solid #2563eb; margin-top: 0.75rem; }
        .message { margin-top: 1rem; padding: 0.5rem; border-radius: 0.5rem; font-size: 0.875rem; text-align: center; display: none; }
        .error { background: rgba(239,68,68,0.1); color: #f87171; border-left: 3px solid #f87171; display: block; }
        .success { background: rgba(34,197,94,0.1); color: #4ade80; border-left: 3px solid #4ade80; display: block; }
        .info { background: rgba(59,130,246,0.1); color: #60a5fa; border-left: 3px solid #60a5fa; display: block; }
        .forgot-link { text-align: right; margin-top: -0.5rem; margin-bottom: 1rem; }
        .forgot-link a { color: #60a5fa; font-size: 0.75rem; text-decoration: none; cursor: pointer; }
        .footer { text-align: center; margin-top: 1.5rem; font-size: 0.75rem; color: #64748b; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <h2>Xroga AI</h2>
        <div class="sub">Sign in to your account</div>

        <div class="input-group">
            <label>Email address</label>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Your password" autocomplete="current-password">
        </div>

        <div class="forgot-link">
            <a id="forgotPasswordBtn">Forgot password?</a>
        </div>

        <button id="signInBtn">Sign In</button>
        <button id="signUpBtn" class="btn-outline">Create New Account</button>

        <div id="message" class="message"></div>
        <div class="footer">By continuing, you agree to our Terms and Privacy Policy.</div>
    </div>

    <script>
        const supabase = supabase.createClient(
            'https://nzenxdfumxrnsmybazmo.supabase.co',
            'sb_publishable_K1uE4mTqb5q3OexAuKF91Q_xbHnlxwl'
        );

        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const signInBtn = document.getElementById('signInBtn');
        const signUpBtn = document.getElementById('signUpBtn');
        const forgotBtn = document.getElementById('forgotPasswordBtn');
        const messageDiv = document.getElementById('message');

        function showMessage(text, type = 'error') {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            setTimeout(() => { messageDiv.className = 'message'; }, 5000);
        }

        function setLoading(loading) {
            signInBtn.disabled = loading;
            signUpBtn.disabled = loading;
            signInBtn.textContent = loading ? 'Loading...' : 'Sign In';
            signUpBtn.textContent = loading ? 'Loading...' : 'Create New Account';
        }

        async function handleForgotPassword() {
            const email = emailInput.value.trim();
            if (!email) return showMessage('Please enter your email address to reset your password.');
            setLoading(true);
            const { error } = await supabase.auth.resetPasswordForEmail(email, {
                redirectTo: 'https://xroga.com/update-password.html',
            });
            setLoading(false);
            if (error) { showMessage(error.message); } 
            else { showMessage('Password reset email sent! Check your inbox.', 'success'); }
        }

        async function handleSignUp() {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            if (!email || !password) return showMessage('Please enter both email and password.');
            if (password.length < 6) return showMessage('Password must be at least 6 characters.');
            setLoading(true);
            const { error } = await supabase.auth.signUp({ email, password });
            setLoading(false);
            if (error) { showMessage(error.message); } 
            else { showMessage('Account created! Please check your email to confirm your account.', 'success'); }
        }

        async function handleSignIn() {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            if (!email || !password) return showMessage('Please enter both email and password.');
            setLoading(true);
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            setLoading(false);
            if (error) { showMessage(error.message); } 
            else { window.location.href = 'https://xroga.com/'; }
        }

        signInBtn.addEventListener('click', handleSignIn);
        signUpBtn.addEventListener('click', handleSignUp);
        forgotBtn.addEventListener('click', handleForgotPassword);
        emailInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSignIn(); });
        passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSignIn(); });
    </script>
</body>
</html>
