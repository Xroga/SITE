<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign in – Xroga AI</title>
    <style>
        body { background: radial-gradient(circle at 10% 20%, #0f172a, #1e1b4b); min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: system-ui; margin: 0; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border-radius: 2rem; padding: 2rem; text-align: center; }
        button { background: white; border: none; padding: 0.8rem 1.5rem; border-radius: 2rem; font-size: 1rem; cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
            }
        }
    </script>
</head>
<body>
<div class="card">
    <h2 style="color:white; margin-bottom:1rem;">Xroga AI</h2>
    <button id="google-signin">🐙 Sign in with Google</button>
    <div id="status" style="color:white; margin-top:1rem;"></div>
</div>
<script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "firebase/auth";

    const firebaseConfig = {
        apiKey: "AIzaSyAgcStVL656Vt932deq7s7UeA1Urum9O-Q",
        authDomain: "xrogaai.firebaseapp.com",
        projectId: "xrogaai",
        storageBucket: "xrogaai.firebasestorage.app",
        messagingSenderId: "401390812801",
        appId: "1:401390812801:web:63b04785f1a0aea1349780"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    document.getElementById('google-signin').onclick = async () => {
        try {
            const result = await signInWithPopup(auth, provider);
            const firebaseToken = await result.user.getIdToken();

            const response = await fetch('https://r2-upload.evanderthorne-help.workers.dev/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ firebaseToken })
            });
            if (!response.ok) throw new Error('Token exchange failed');
            const { access_token, user_id } = await response.json();

            localStorage.setItem('supabase_token', access_token);
            localStorage.setItem('supabase_user_id', user_id);
            window.location.href = 'https://xroga.com/';
        } catch (err) {
            document.getElementById('status').innerText = err.message;
        }
    };
</script>
</body>
</html>
