<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in / Sign up | Xroga AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .container { max-width: 28rem; width: 100%; }
        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
        }
        h2 { color: white; text-align: center; margin-bottom: 0.5rem; }
        .sub { color: #cbd5e1; text-align: center; margin-bottom: 1.5rem; }
        input {
            width: 100%; padding: 0.75rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 0.75rem;
            color: white;
            margin-bottom: 1rem;
        }
        button {
            width: 100%; padding: 0.75rem;
            background: #2563eb; border: none;
            border-radius: 0.75rem;
            color: white; font-weight: bold;
            cursor: pointer;
        }
        .message { margin-top: 1rem; padding: 0.5rem; border-radius: 0.5rem; text-align: center; }
        .error { color: #f87171; background: rgba(248,113,113,0.1); }
        .success { color: #4ade80; background: rgba(74,222,128,0.1); }
        .hidden { display: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>Welcome to Xroga AI</h2>
        <div class="sub">Enter your email – we’ll send a magic link</div>
        <input type="email" id="email" placeholder="your@email.com">
        <button id="send-btn">Send magic link</button>
        <div id="message" class="message hidden"></div>
    </div>
</div>
<script>
    const SUPABASE_URL = 'https://nzenxdfumxrnsmybazmo.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_K1uE4mTqb5q3OexAuKF91Q_xbHnlxwl';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const emailInput = document.getElementById('email');
    const sendBtn = document.getElementById('send-btn');
    const msgDiv = document.getElementById('message');

    function showMessage(text, isError = true) {
        msgDiv.textContent = text;
        msgDiv.className = `message ${isError ? 'error' : 'success'}`;
        msgDiv.classList.remove('hidden');
        setTimeout(() => msgDiv.classList.add('hidden'), 6000);
    }

    sendBtn.onclick = async () => {
        const email = emailInput.value.trim();
        if (!email) return showMessage('Please enter your email');

        sendBtn.disabled = true;
        sendBtn.textContent = 'Sending...';

        const { error } = await supabase.auth.signInWithOtp({
            email: email,
            options: {
                shouldCreateUser: true,
                emailRedirectTo: 'https://xroga.com/'   // ← MUST match allowed URL
            }
        });

        sendBtn.disabled = false;
        sendBtn.textContent = 'Send magic link';

        if (error) {
            showMessage(error.message);
            console.error(error);
        } else {
            showMessage(`✨ Magic link sent to ${email}. Check your inbox & spam.`, false);
            emailInput.value = '';
        }
    };

    // Auto‑redirect if already logged in
    supabase.auth.getSession().then(({ data: { session } }) => {
        if (session) location.href = 'https://xroga.com/';
    });
</script>
</body>
</html>
