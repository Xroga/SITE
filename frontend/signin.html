<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in / Sign up | Xroga AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at 10% 20%, #0f172a, #1e1b4b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .card {
            max-width: 460px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.4);
        }
        h2 {
            color: white;
            text-align: center;
            margin-bottom: 0.25rem;
        }
        .sub {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .input-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            color: #cbd5e1;
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
        }
        input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1rem;
            color: white;
            font-size: 1rem;
            transition: 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.12);
        }
        button {
            width: 100%;
            background: linear-gradient(105deg, #2563eb, #3b82f6);
            border: none;
            padding: 0.8rem;
            border-radius: 1rem;
            font-weight: 600;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
        }
        button:hover {
            background: linear-gradient(105deg, #1d4ed8, #2563eb);
            transform: scale(0.98);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            margin-top: 1rem;
            padding: 0.7rem;
            border-radius: 1rem;
            font-size: 0.9rem;
            text-align: center;
        }
        .error {
            background: rgba(248,113,113,0.15);
            color: #f87171;
            border-left: 3px solid #f87171;
        }
        .success {
            background: rgba(74,222,128,0.1);
            color: #4ade80;
            border-left: 3px solid #4ade80;
        }
        .hidden { display: none; }
        .forgot {
            text-align: right;
            font-size: 0.75rem;
            margin-top: -0.5rem;
            margin-bottom: 1rem;
            cursor: pointer;
            color: #60a5fa;
            display: inline-block;
            width: 100%;
        }
        .footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #64748b;
        }
        .footer a {
            color: #60a5fa;
            text-decoration: none;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="card">
    <h2>Xroga AI</h2>
    <div class="sub">Sign in or create an account with one click</div>

    <div class="input-group">
        <label>Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>

    <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="•••••••• (min 6 chars)" autocomplete="current-password">
    </div>

    <div id="forgot-btn" class="forgot">Forgot password?</div>

    <button id="submit-btn">Continue</button>

    <div id="message" class="message hidden"></div>

    <div class="footer">
        By continuing, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
    </div>
</div>

<script>
    (function() {
        // ========== SUPABASE CONFIG ==========
        const SUPABASE_URL = 'https://nzenxdfumxrnsmybazmo.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_K1uE4mTqb5q3OexAuKF91Q_xbHnlxwl';
        
        let supabase;
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('✅ Supabase client created');
        } catch (err) {
            console.error('❌ Supabase client error:', err);
            alert('Failed to initialize auth. Please refresh the page.');
            return;
        }

        // ========== DOM ELEMENTS ==========
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submit-btn');
        const msgDiv = document.getElementById('message');
        const forgotBtn = document.getElementById('forgot-btn');

        if (!emailInput || !passwordInput || !submitBtn || !msgDiv || !forgotBtn) {
            console.error('❌ Missing DOM elements');
            return;
        }

        function showMessage(text, isError = true) {
            msgDiv.textContent = text;
            msgDiv.className = `message ${isError ? 'error' : 'success'}`;
            msgDiv.classList.remove('hidden');
            setTimeout(() => msgDiv.classList.add('hidden'), 5000);
        }

        function setLoading(loading) {
            submitBtn.disabled = loading;
            submitBtn.textContent = loading ? 'Processing...' : 'Continue';
        }

        // Forgot password
        async function forgotPassword() {
            const email = emailInput.value.trim();
            if (!email) {
                showMessage('Please enter your email address first.');
                return;
            }
            setLoading(true);
            try {
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: 'https://xroga.com/update-password.html',
                });
                if (error) throw error;
                showMessage('📧 Password reset email sent! Check your inbox (and spam).', false);
            } catch (err) {
                showMessage(err.message);
            } finally {
                setLoading(false);
            }
        }

        // Unified sign‑in / sign‑up
        async function handleAuth() {
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showMessage('Please enter both email and password.');
                return;
            }
            if (password.length < 6) {
                showMessage('Password must be at least 6 characters.');
                return;
            }

            setLoading(true);
            try {
                // Try to sign in first
                console.log('Attempting sign in for:', email);
                const { data: signInData, error: signInError } = await supabase.auth.signInWithPassword({ email, password });

                if (!signInError) {
                    console.log('✅ Sign in successful');
                    showMessage('🎉 Signed in! Redirecting...', false);
                    setTimeout(() => {
                        window.location.href = 'https://xroga.com/';
                    }, 1200);
                    return;
                }

                console.log('Sign in error:', signInError.message);
                // If sign-in fails because user doesn't exist, sign them up
                if (signInError.message.includes('Invalid login credentials')) {
                    console.log('User not found, attempting sign up...');
                    const { error: signUpError } = await supabase.auth.signUp({
                        email,
                        password,
                        options: { emailRedirectTo: 'https://xroga.com/' }
                    });
                    if (signUpError) throw signUpError;
                    showMessage(
                        '✅ Account created! Please check your email to confirm (if confirmation is enabled). You can then sign in.',
                        false
                    );
                    passwordInput.value = '';
                } else {
                    // Other error (e.g., email not confirmed)
                    throw signInError;
                }
            } catch (err) {
                console.error('Auth error:', err);
                let message = err.message;
                if (message.includes('Email not confirmed')) {
                    message = 'Please confirm your email address before signing in. Check your inbox.';
                }
                showMessage(message);
            } finally {
                setLoading(false);
            }
        }

        // Attach event listeners
        submitBtn.addEventListener('click', handleAuth);
        forgotBtn.addEventListener('click', forgotPassword);
        emailInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAuth(); });
        passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAuth(); });

        console.log('✅ All event listeners attached');
    })();
</script>
</body>
</html>
