<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <input type="email" id="email2" placeholder="Email">
  <button id="send2">Send magic link</button>
  <script>
    const supabase = window.supabase.createClient(
      'https://nzenxdfumxrnsmybazmo.supabase.co',
      'sb_publishable_K1uE4mTqb5q3OexAuKF91Q_xbHnlxwl'
    );
    document.getElementById('send2').onclick = async () => {
      const email = document.getElementById('email2').value;
      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: 'https://xroga.com/' }
      });
      if (error) alert(error.message);
      else alert('Link sent!');
    };
  </script>
</body>
</html>
