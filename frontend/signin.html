<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign in / Sign up | Xroga AI</title>
    <style>
        /* (keep your existing CSS – unchanged) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: radial-gradient(circle at 10% 20%, #0f172a, #1e1b4b); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
        .card { max-width: 480px; width: 100%; background: rgba(255,255,255,0.05); backdrop-filter: blur(16px); border-radius: 2rem; border: 1px solid rgba(255,255,255,0.1); padding: 2rem; }
        input, button { width: 100%; padding: 0.9rem; margin-bottom: 1rem; border-radius: 1rem; border: none; font-size: 1rem; }
        input { background: rgba(255,255,255,0.08); color: white; }
        button { background: #2563eb; color: white; font-weight: bold; cursor: pointer; }
        .message { margin-top: 1rem; padding: 0.5rem; border-radius: 0.5rem; text-align: center; }
        .error { color: #f87171; background: rgba(248,113,113,0.1); }
        .success { color: #4ade80; background: rgba(74,222,128,0.1); }
        .hidden { display: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="card">
    <h2>Welcome to Xroga AI</h2>
    <input type="email" id="email" placeholder="Email" autocomplete="email">
    <input type="password" id="password" placeholder="Password (min 6 characters)">
    <button id="signin-btn">Sign In</button>
    <button id="signup-btn">Sign Up</button>
    <div id="message" class="message hidden"></div>
    <p style="text-align:center; margin-top:1rem; font-size:0.8rem;">
        <a href="#" id="show-signup" style="color:#60a5fa;">Create new account</a>
    </p>
</div>
<script>
    const SUPABASE_URL = 'https://nzenxdfumxrnsmybazmo.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_K1uE4mTqb5q3OexAuKF91Q_xbHnlxwl';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let isSignUp = false;

    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const signinBtn = document.getElementById('signin-btn');
    const signupBtn = document.getElementById('signup-btn');
    const messageDiv = document.getElementById('message');
    const showSignupLink = document.getElementById('show-signup');

    function showMessage(text, isError = true) {
        messageDiv.textContent = text;
        messageDiv.className = `message ${isError ? 'error' : 'success'}`;
        messageDiv.classList.remove('hidden');
        setTimeout(() => messageDiv.classList.add('hidden'), 5000);
    }

    async function handleAuth() {
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        if (!email || !password) return showMessage('Please enter email and password');
        if (password.length < 6) return showMessage('Password must be at least 6 characters');

        const btn = isSignUp ? signupBtn : signinBtn;
        const originalText = btn.textContent;
        btn.disabled = true;
        btn.textContent = 'Processing...';

        try {
            if (isSignUp) {
                const { error } = await supabase.auth.signUp({ email, password });
                if (error) throw error;
                showMessage('Account created! Please check your email to confirm (if enabled). Then sign in.', false);
                // Switch to sign in mode automatically
                isSignUp = false;
                signinBtn.style.display = 'block';
                signupBtn.style.display = 'none';
                showSignupLink.textContent = 'Create new account';
                emailInput.value = '';
                passwordInput.value = '';
            } else {
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                showMessage('Signed in! Redirecting...', false);
                setTimeout(() => { window.location.href = 'https://xroga.com/'; }, 1200);
            }
        } catch (err) {
            showMessage(err.message);
        } finally {
            btn.disabled = false;
            btn.textContent = originalText;
        }
    }

    signinBtn.addEventListener('click', () => handleAuth());
    signupBtn.addEventListener('click', () => handleAuth());
    showSignupLink.addEventListener('click', (e) => {
        e.preventDefault();
        isSignUp = !isSignUp;
        if (isSignUp) {
            signinBtn.style.display = 'none';
            signupBtn.style.display = 'block';
            showSignupLink.textContent = 'Back to Sign In';
        } else {
            signinBtn.style.display = 'block';
            signupBtn.style.display = 'none';
            showSignupLink.textContent = 'Create new account';
        }
    });
    // Initially hide signup button
    signupBtn.style.display = 'none';
</script>
</body>
</html>
