<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Xroga Debug – Email Sign</title>
    <style>
        body { font-family: system-ui; background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 2rem; padding: 2rem; max-width: 400px; width: 100%; color: white; text-align: center; }
        input, button { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 40px; border: none; font-size: 1rem; }
        input { background: rgba(255,255,255,0.2); color: white; }
        button { background: linear-gradient(105deg, #2563eb, #ffffff); font-weight: bold; cursor: pointer; }
        pre { background: #1e293b; padding: 10px; border-radius: 12px; overflow-x: auto; font-size: 12px; text-align: left; margin-top: 20px; }
    </style>
</head>
<body>
<div class="card">
    <h2>Xroga AI – Debug Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password (min 6)">
    <button id="signupBtn">Sign up (debug)</button>
    <button id="signinBtn">Sign in (debug)</button>
    <div id="log" style="margin-top: 16px; font-size: 12px; text-align: left; background: #00000055; padding: 8px; border-radius: 12px;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // Supabase config
    const SUPABASE_URL = 'https://nzenxdfumxrnsmybazmo.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_K1uE4mTqb5q3OexAuKF91Q_xbHnlxwl';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // DOM elements
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const signupBtn = document.getElementById('signupBtn');
    const signinBtn = document.getElementById('signinBtn');
    const logDiv = document.getElementById('log');

    function addLog(msg) {
        const p = document.createElement('div');
        p.textContent = msg;
        logDiv.appendChild(p);
        console.log(msg);
    }

    // SIGN UP
    signupBtn.onclick = async () => {
        addLog('➡️ Signup button clicked');
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        if (!email || !password) {
            addLog('❌ Missing email or password');
            return;
        }
        if (password.length < 6) {
            addLog('❌ Password too short (min 6)');
            return;
        }
        addLog(`📧 Attempting signup for ${email}`);
        signupBtn.disabled = true;
        signupBtn.textContent = '...';
        try {
            const { data, error } = await supabase.auth.signUp({ email, password });
            if (error) {
                addLog(`❌ Signup error: ${error.message}`);
            } else {
                if (data.user?.identities?.length === 0) {
                    addLog('⚠️ User already exists – try signing in');
                } else {
                    addLog('✅ Signup success! You can now sign in.');
                    passwordInput.value = '';
                }
            }
        } catch (err) {
            addLog(`🔥 Exception: ${err.message}`);
        } finally {
            signupBtn.disabled = false;
            signupBtn.textContent = 'Sign up (debug)';
        }
    };

    // SIGN IN
    signinBtn.onclick = async () => {
        addLog('➡️ Signin button clicked');
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        if (!email || !password) {
            addLog('❌ Missing email or password');
            return;
        }
        addLog(`🔐 Attempting signin for ${email}`);
        signinBtn.disabled = true;
        signinBtn.textContent = '...';
        try {
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                addLog(`❌ Signin error: ${error.message}`);
            } else {
                addLog('✅ Signed in! Redirecting to https://xroga.com/ ...');
                setTimeout(() => { window.location.href = 'https://xroga.com/'; }, 1000);
            }
        } catch (err) {
            addLog(`🔥 Exception: ${err.message}`);
        } finally {
            signinBtn.disabled = false;
            signinBtn.textContent = 'Sign in (debug)';
        }
    };
</script>
</body>
</html>
