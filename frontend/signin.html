<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign in / Sign up | Xroga AI</title>
    <!-- (same styling, but add reset password link) -->
    <style>
        /* (keep existing style, add .reset-link) */
        .reset-link { display: block; text-align: right; font-size: 0.8rem; margin-top: -0.5rem; margin-bottom: 1rem; }
        .reset-link a { color: #60a5fa; text-decoration: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="card">
    <h2 id="form-title">Sign In</h2>
    <input type="email" id="email" placeholder="Email" autocomplete="email">
    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    <div class="reset-link" id="forgot-container" style="display: none;">
        <a href="#" id="forgot-link">Forgot password?</a>
    </div>
    <button id="submit-btn">Sign In</button>
    <div id="message" class="message hidden"></div>
    <p style="text-align:center; margin-top:1rem;">
        <a href="#" id="toggle-mode">Create new account</a>
    </p>
</div>
<script>
    const SUPABASE_URL = 'https://nzenxdfumxrnsmybazmo.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_K1uE4mTqb5q3OexAuKF91Q_xbHnlxwl';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let isSignUp = false;
    const titleEl = document.getElementById('form-title');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submit-btn');
    const msgDiv = document.getElementById('message');
    const toggleLink = document.getElementById('toggle-mode');
    const forgotContainer = document.getElementById('forgot-container');
    const forgotLink = document.getElementById('forgot-link');

    function showMessage(text, isError = true) {
        msgDiv.textContent = text;
        msgDiv.className = `message ${isError ? 'error' : 'success'}`;
        msgDiv.classList.remove('hidden');
        setTimeout(() => msgDiv.classList.add('hidden'), 5000);
    }

    async function handleAuth() {
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        if (!email || !password) return showMessage('Please enter email and password');

        submitBtn.disabled = true;
        submitBtn.textContent = 'Processing...';

        try {
            if (isSignUp) {
                // Sign up with email confirmation
                const { error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: { emailRedirectTo: 'https://xroga.com/' } // optional: redirect after confirmation
                });
                if (error) throw error;
                showMessage('Account created! Check your email to confirm your account.', false);
                // Clear form and stay on sign-in mode (but user cannot sign in until confirmed)
                emailInput.value = '';
                passwordInput.value = '';
                // Switch to sign-in mode automatically
                isSignUp = false;
                updateUIMode();
            } else {
                // Sign in
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                showMessage('Signed in! Redirecting...', false);
                setTimeout(() => { window.location.href = 'https://xroga.com/'; }, 1200);
            }
        } catch (err) {
            if (err.message.includes('Email not confirmed')) {
                showMessage('Please confirm your email address before signing in.', true);
            } else {
                showMessage(err.message);
            }
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = isSignUp ? 'Sign Up' : 'Sign In';
        }
    }

    async function handleForgotPassword() {
        const email = emailInput.value.trim();
        if (!email) return showMessage('Please enter your email address.');
        const { error } = await supabase.auth.resetPasswordForEmail(email, {
            redirectTo: 'https://xroga.com/update-password', // make a page for updating password
        });
        if (error) {
            showMessage(error.message);
        } else {
            showMessage('Password reset email sent! Check your inbox.', false);
        }
    }

    function updateUIMode() {
        if (isSignUp) {
            titleEl.textContent = 'Sign Up';
            submitBtn.textContent = 'Sign Up';
            toggleLink.textContent = 'Back to Sign In';
            forgotContainer.style.display = 'none';
        } else {
            titleEl.textContent = 'Sign In';
            submitBtn.textContent = 'Sign In';
            toggleLink.textContent = 'Create new account';
            forgotContainer.style.display = 'block';
        }
    }

    toggleLink.addEventListener('click', (e) => {
        e.preventDefault();
        isSignUp = !isSignUp;
        updateUIMode();
        // Clear any previous messages
        msgDiv.classList.add('hidden');
    });

    forgotLink.addEventListener('click', (e) => {
        e.preventDefault();
        handleForgotPassword();
    });

    submitBtn.addEventListener('click', handleAuth);
    emailInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAuth(); });
    passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAuth(); });

    updateUIMode();
</script>
</body>
</html>
