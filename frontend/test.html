<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xroga UI Test – Supabase Login</title>
    <!-- Tailwind CDN (only for styling, not needed for function) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons (for the user icon) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white p-6">
    <div class="max-w-md mx-auto">
        <!-- Sidebar HTML (exactly as in your main page) -->
        <div id="user-display" class="flex items-center justify-between p-3 rounded-xl bg-gradient-to-r from-primary-500/20 to-purple-500/20 dark:from-primary-900/30 dark:to-purple-900/30 backdrop-blur-sm mb-2">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-primary-500/30 dark:bg-primary-900/30 rounded-lg">
                    <i data-lucide="user" class="w-4 h-4 text-primary-600 dark:text-primary-400"></i>
                </div>
                <p class="text-xs text-gray-600 dark:text-gray-400">Not logged in</p>
            </div>
            <button id="logout-btn" type="button" class="text-xs px-2 py-1 bg-white/30 dark:bg-gray-700/50 rounded-md hidden">Logout</button>
        </div>

        <div class="p-4 border-t border-white/30 dark:border-gray-700/30">
            <a href="https://xroga.com/signin.html" id="login-show-btn"
               class="w-full bg-white dark:bg-gray-800 text-gray-700 dark:text-white border border-gray-300 dark:border-gray-600 rounded-lg py-3 px-4 flex items-center justify-center gap-3 font-medium shadow-sm hover:shadow-md transition-all duration-200 hover:bg-gray-50 dark:hover:bg-gray-700 active:scale-[0.98]">
                <i data-lucide="mail" class="w-5 h-5"></i>
                <span class="font-medium">Sign in with Email</span>
            </a>
        </div>

        <div class="mt-8 text-center text-sm">
            <p id="session-status" class="text-gray-400">Checking session...</p>
        </div>
    </div>

    <!-- Your Supabase script (copied exactly, without modifications) -->
    <script>
        // ==================== SUPABASE CONFIG ====================
        const SUPABASE_URL = 'https://nzenxdfumxrnsmybazmo.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_K1uE4mTqb5q3OexAuKF91Q_xbHnlxwl';
        const WORKER_URL = 'https://r2-upload.evanderthorne-help.workers.dev';
        // ==================== DOM ELEMENTS ====================
        const userDisplay = document.getElementById('user-display');
        const logoutBtn = document.getElementById('logout-btn');
        const loginShowBtn = document.getElementById('login-show-btn');
        const toastEl = document.getElementById('toast');
        const toastTitle = document.getElementById('toast-title');
        const toastMessage = document.getElementById('toast-message');

        function showToast(title, message, isSuccess = true) {
            if (!toastEl) return;
            toastTitle.textContent = title;
            toastMessage.textContent = message;
            toastEl.classList.remove('hidden', 'opacity-0', 'translate-y-4');
            setTimeout(() => {
                toastEl.classList.add('opacity-0', 'translate-y-4');
                setTimeout(() => toastEl.classList.add('hidden'), 300);
            }, 3000);
        }

        // ==================== UPDATE UI ====================
        async function updateUIWithSession() {
            const { data: { session } } = await supabase.auth.getSession();
            const user = session?.user || null;
            if (user) {
                const meta = user.user_metadata;
                const name = meta?.full_name || user.email;
                const avatar = meta?.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=3b82f6&color=fff`;
                if (userDisplay) userDisplay.innerHTML = `
                    <div class="flex items-center gap-2">
                        <img src="${avatar}" class="w-8 h-8 rounded-full">
                        <span class="text-sm font-medium">${name}</span>
                    </div>
                `;
                if (logoutBtn) logoutBtn.classList.remove('hidden');
                if (loginShowBtn) loginShowBtn.classList.add('hidden');
                document.getElementById('session-status').innerHTML = `✅ Logged in as <strong>${user.email}</strong>`;
            } else {
                if (userDisplay) userDisplay.innerHTML = `
                    <div class="flex items-center gap-2">
                        <i data-lucide="user" class="w-4 h-4 text-primary-600 dark:text-primary-400"></i>
                        <span class="text-xs text-gray-600 dark:text-gray-400">Not logged in</span>
                    </div>
                `;
                if (logoutBtn) logoutBtn.classList.add('hidden');
                if (loginShowBtn) loginShowBtn.classList.remove('hidden');
                document.getElementById('session-status').innerHTML = `❌ Not logged in`;
            }
            if (window.lucide) lucide.createIcons();
        }

        // ==================== HELPER: GET USER ID ====================
        async function getCurrentUserId() {
            const { data: { session } } = await supabase.auth.getSession();
            return session?.user?.id || null;
        }

        // ==================== CHAT METADATA (CLOUD) ====================
        let currentChatUUID = null;

        async function loadUserChatList() {
            const userId = await getCurrentUserId();
            if (!userId) return [];
            const { data, error } = await supabase
                .from('chat_metadata')
                .select('*')
                .eq('user_id', userId)
                .order('updated_at', { ascending: false });
            if (error) {
                console.error('Error loading chat list:', error);
                return [];
            }
            return data;
        }

        async function createNewChatInCloud(title = 'New Chat') {
            const userId = await getCurrentUserId();
            if (!userId) return null;
            const { data, error } = await supabase
                .from('chat_metadata')
                .insert({
                    user_id: userId,
                    title: title,
                    created_at: new Date().toISOString(),
                    updated_at: new Date().toISOString()
                })
                .select()
                .single();
            if (error) {
                console.error('Failed to create new chat:', error);
                showToast('Failed to create new chat', 'Error', false);
                return null;
            }
            currentChatUUID = data.id;
            if (window.xroga && window.xroga.state) {
                window.xroga.state.currentChatId = currentChatUUID;
                window.xroga.state.chats = window.xroga.state.chats || [];
                window.xroga.state.chats.unshift({
                    id: currentChatUUID,
                    title: data.title,
                    timestamp: data.created_at,
                    pinned: false,
                    type: 'code',
                    messages: []
                });
                if (typeof window.xroga.loadChatHistory === 'function') window.xroga.loadChatHistory();
            }
            return data;
        }

        async function loadMessagesForChat(chatId) {
            const { data, error } = await supabase
                .from('chats')
                .select('*')
                .eq('chat_id', chatId)
                .order('created_at', { ascending: true });
            if (error) {
                console.error('Error loading messages:', error);
                return [];
            }
            return data;
        }

        async function switchToChat(chatId) {
            currentChatUUID = chatId;
            if (window.xroga && window.xroga.state) {
                window.xroga.state.currentChatId = chatId;
            }
            if (typeof clearChatUI === 'function') clearChatUI();
            const messages = await loadMessagesForChat(chatId);
            for (const msg of messages) {
                if (msg.role === 'user' && typeof addUserMessage === 'function')
                    addUserMessage(msg.content, false);
                else if (msg.role === 'assistant') {
                    if (msg.type === 'code' && typeof addCodeResponse === 'function')
                        addCodeResponse(msg.content, false);
                    else if (msg.type === 'image' && typeof displayImageResult === 'function')
                        displayImageResult(msg.content, '', false);
                    else if (typeof addAIMessage === 'function')
                        addAIMessage(msg.content, false);
                }
            }
            lastMessageTimestamp = messages.length ? messages[messages.length-1].created_at : null;
        }

        // ==================== SAVE CHAT MESSAGE (with chat_id) ====================
        window.saveChatMessage = async function(role, content, messageId, type = 'text') {
            const userId = await getCurrentUserId();
            if (!userId) {
                console.error('❌ Not authenticated – cannot save');
                return;
            }
            if (!currentChatUUID) {
                const newChat = await createNewChatInCloud();
                if (!newChat) return;
            }
            const { error } = await supabase.from('chats').insert({
                user_id: userId,
                chat_id: currentChatUUID,
                role,
                content,
                message_id: messageId,
                created_at: new Date().toISOString(),
                type
            });
            if (error) console.error('Save chat error:', error);
        };

        // ==================== POLL MESSAGES (for current chat) ====================
        let lastMessageTimestamp = null;
        let pollInterval = null;

        async function pollNewMessages() {
            if (!currentChatUUID) return;
            let query = supabase
                .from('chats')
                .select('*')
                .eq('chat_id', currentChatUUID)
                .order('created_at', { ascending: true });
            if (lastMessageTimestamp) query = query.gt('created_at', lastMessageTimestamp);
            const { data, error } = await query;
            if (error) { console.error('Poll error:', error); return; }
            if (data && data.length) {
                for (const msg of data) {
                    if (msg.role === 'user' && typeof addUserMessage === 'function')
                        addUserMessage(msg.content, false);
                    else if (msg.role === 'assistant') {
                        if (msg.type === 'code' && typeof addCodeResponse === 'function')
                            addCodeResponse(msg.content, false);
                        else if (msg.type === 'image' && typeof displayImageResult === 'function')
                            displayImageResult(msg.content, '', false);
                        else if (typeof addAIMessage === 'function')
                            addAIMessage(msg.content, false);
                    }
                }
                lastMessageTimestamp = data[data.length - 1].created_at;
            }
        }

        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(pollNewMessages, 5000);
        }
        function stopPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = null;
        }

        // ==================== UPDATE / DELETE MESSAGE ====================
        window.updateChatMessage = async function(messageId, newContent) {
            const userId = await getCurrentUserId();
            if (!userId) return;
            await supabase.from('chats').update({ content: newContent }).eq('message_id', messageId).eq('user_id', userId);
        };
        window.deleteChatMessage = async function(messageId) {
            const userId = await getCurrentUserId();
            if (!userId) return;
            await supabase.from('chats').delete().eq('message_id', messageId).eq('user_id', userId);
        };

        // ==================== UPLOAD & WEBSITE ====================
        async function uploadToR2(fileBlob, filename, bucketType) {
            const { data: { session } } = await supabase.auth.getSession();
            const token = session?.access_token;
            if (!token) throw new Error('Not authenticated');
            const res = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ filename, bucketType })
            });
            if (!res.ok) throw new Error('Failed to get upload URL');
            const { url, key } = await res.json();
            const uploadRes = await fetch(url, { method: 'PUT', body: fileBlob });
            if (!uploadRes.ok) throw new Error('Upload failed');
            return key;
        }

        window.saveWebsiteToCloud = async function(title, codeHtml, subdomain) {
            const userId = await getCurrentUserId();
            if (!userId) return;
            try {
                const blob = new Blob([codeHtml], { type: 'text/html' });
                const filename = `${title.replace(/\s/g, '_')}.html`;
                const r2Key = await uploadToR2(blob, filename, 'website');
                await supabase.from('websites').insert({
                    user_id: userId,
                    title,
                    r2_key: r2Key,
                    subdomain
                });
                showToast('Website saved to cloud!', 'Success');
            } catch (err) {
                console.error('Save website error:', err);
                showToast('Failed to save website', 'Error', false);
            }
        };

        // ==================== LOGOUT ====================
        logoutBtn?.addEventListener('click', async () => {
            await supabase.auth.signOut();
            showToast('Signed Out', 'You have been logged out.');
            currentChatUUID = null;
            stopPolling();
            lastMessageTimestamp = null;
            if (typeof clearChatUI === 'function') clearChatUI();
            await updateUIWithSession();
        });

        // ==================== INITIALIZE: MAGIC LINK & RESTORE SESSION ====================
        (async () => {
            if (window.location.hash && window.location.hash.includes('access_token')) {
                console.log('🔐 Magic link detected – waiting for session');
                await new Promise(r => setTimeout(r, 1000));
                window.history.replaceState(null, '', window.location.pathname + window.location.search);
            }
            await updateUIWithSession();
            const userId = await getCurrentUserId();
            if (userId) {
                const userChats = await loadUserChatList();
                if (userChats.length > 0) {
                    const latestChat = userChats[0];
                    currentChatUUID = latestChat.id;
                    if (window.xroga && window.xroga.state) {
                        window.xroga.state.chats = userChats.map(c => ({
                            id: c.id,
                            title: c.title,
                            timestamp: c.created_at,
                            pinned: false,
                            type: 'code',
                            messages: []
                        }));
                        window.xroga.state.currentChatId = currentChatUUID;
                        if (typeof window.xroga.loadChatHistory === 'function') window.xroga.loadChatHistory();
                    }
                    const messages = await loadMessagesForChat(currentChatUUID);
                    if (messages.length) {
                        if (typeof clearChatUI === 'function') clearChatUI();
                        for (const m of messages) {
                            if (m.role === 'user' && typeof addUserMessage === 'function')
                                addUserMessage(m.content, false);
                            else if (m.role === 'assistant') {
                                if (m.type === 'code' && typeof addCodeResponse === 'function')
                                    addCodeResponse(m.content, false);
                                else if (m.type === 'image' && typeof displayImageResult === 'function')
                                    displayImageResult(m.content, '', false);
                                else if (typeof addAIMessage === 'function')
                                    addAIMessage(m.content, false);
                            }
                        }
                        lastMessageTimestamp = messages[messages.length-1].created_at;
                    }
                } else {
                    await createNewChatInCloud('My first chat');
                }
                startPolling();
            }
        })();

        // ==================== AUTH STATE CHANGE ====================
        supabase.auth.onAuthStateChange(async (event, session) => {
            console.log('Auth event:', event);
            await updateUIWithSession();
            if (event === 'SIGNED_IN') {
                const userId = session?.user?.id;
                if (userId) {
                    const userChats = await loadUserChatList();
                    if (userChats.length > 0) {
                        currentChatUUID = userChats[0].id;
                        if (window.xroga && window.xroga.state) {
                            window.xroga.state.chats = userChats.map(c => ({ id: c.id, title: c.title, timestamp: c.created_at, pinned: false, type: 'code', messages: [] }));
                            window.xroga.state.currentChatId = currentChatUUID;
                            if (typeof window.xroga.loadChatHistory === 'function') window.xroga.loadChatHistory();
                        }
                        const messages = await loadMessagesForChat(currentChatUUID);
                        if (messages.length) {
                            if (typeof clearChatUI === 'function') clearChatUI();
                            for (const m of messages) {
                                if (m.role === 'user' && typeof addUserMessage === 'function')
                                    addUserMessage(m.content, false);
                                else if (m.role === 'assistant') {
                                    if (m.type === 'code' && typeof addCodeResponse === 'function')
                                        addCodeResponse(m.content, false);
                                    else if (m.type === 'image' && typeof displayImageResult === 'function')
                                        displayImageResult(m.content, '', false);
                                    else if (typeof addAIMessage === 'function')
                                        addAIMessage(m.content, false);
                                }
                            }
                            lastMessageTimestamp = messages[messages.length-1].created_at;
                        }
                    } else {
                        await createNewChatInCloud('My first chat');
                    }
                    startPolling();
                }
            } else if (event === 'SIGNED_OUT') {
                stopPolling();
                currentChatUUID = null;
                lastMessageTimestamp = null;
                if (typeof clearChatUI === 'function') clearChatUI();
            }
        });

        // Expose functions for main script
        window.createNewChatInCloud = createNewChatInCloud;
        window.switchToChat = switchToChat;
        window.loadUserChatList = loadUserChatList;
        window.getCurrentChatUUID = () => currentChatUUID;
    </script>
</body>
</html>
