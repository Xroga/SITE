<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Xroga AI</title>
    <style>
        body { font-family: system-ui, 'Segoe UI', Roboto, sans-serif; background: radial-gradient(circle at 10% 20%, #0f172a, #1e1b4b); min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; padding: 1rem; }
        .container { max-width: 400px; width: 100%; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 1.5rem; padding: 2rem; border: 1px solid rgba(255,255,255,0.1); }
        h2 { color: white; text-align: center; margin-bottom: 0.5rem; }
        .sub { text-align: center; color: #9ca3af; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 0.75rem 1rem; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 0.75rem; color: white; margin-bottom: 1rem; }
        button { width: 100%; background: #2563eb; color: white; font-weight: 600; padding: 0.75rem; border: none; border-radius: 0.75rem; cursor: pointer; }
        .message { margin-top: 1rem; padding: 0.5rem; border-radius: 0.5rem; text-align: center; display: none; }
        .error { background: rgba(239,68,68,0.1); color: #f87171; display: block; }
        .success { background: rgba(34,197,94,0.1); color: #4ade80; display: block; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <h2>Reset Password</h2>
        <div class="sub">Enter your new password</div>
        <input type="password" id="newPassword" placeholder="New password (min 6 characters)">
        <button id="updateBtn">Update Password</button>
        <div id="message" class="message"></div>
    </div>
    <script>
        const supabase = supabase.createClient(
            'https://nzenxdfumxrnsmybazmo.supabase.co',
            'sb_publishable_K1uE4mTqb5q3OexAuKF91Q_xbHnlxwl'
        );
        const newPasswordInput = document.getElementById('newPassword');
        const updateBtn = document.getElementById('updateBtn');
        const messageDiv = document.getElementById('message');
        async function updatePassword() {
            const newPassword = newPasswordInput.value;
            if (!newPassword || newPassword.length < 6) { messageDiv.textContent = 'Password must be at least 6 characters.'; messageDiv.className = 'message error'; return; }
            updateBtn.disabled = true;
            updateBtn.textContent = 'Updating...';
            const { error } = await supabase.auth.updateUser({ password: newPassword });
            updateBtn.disabled = false;
            updateBtn.textContent = 'Update Password';
            if (error) { messageDiv.textContent = error.message; messageDiv.className = 'message error'; } 
            else { messageDiv.textContent = 'Password updated successfully! Redirecting to login...'; messageDiv.className = 'message success'; setTimeout(() => { window.location.href = 'https://xroga.com/login.html'; }, 2000); }
        }
        updateBtn.addEventListener('click', updatePassword);
    </script>
</body>
</html>
