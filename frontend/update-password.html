<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Reset password | Xroga AI</title>
    <style>
        body { font-family: system-ui; background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #1e293b; padding: 2rem; border-radius: 1rem; width: 350px; }
        input, button { width: 100%; padding: 0.8rem; margin-top: 0.5rem; border-radius: 0.5rem; border: none; }
        button { background: #2563eb; color: white; cursor: pointer; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="card">
    <h2>Set new password</h2>
    <input type="password" id="new-password" placeholder="New password (min 6 chars)">
    <button id="update-btn">Update password</button>
    <div id="msg" style="margin-top: 1rem; color:white;"></div>
</div>
<script>
    const supabase = supabase.createClient(
        'https://nzenxdfumxrnsmybazmo.supabase.co',
        'sb_publishable_K1uE4mTqb5q3OexAuKF91Q_xbHnlxwl'
    );
    document.getElementById('update-btn').onclick = async () => {
        const newPassword = document.getElementById('new-password').value;
        if (newPassword.length < 6) {
            document.getElementById('msg').innerText = 'Password must be at least 6 characters.';
            return;
        }
        const { error } = await supabase.auth.updateUser({ password: newPassword });
        if (error) {
            document.getElementById('msg').innerText = error.message;
        } else {
            document.getElementById('msg').innerHTML = '✅ Password updated! You can now <a href="/signin.html">sign in</a>.';
        }
    };
</script>
</body>
</html>
