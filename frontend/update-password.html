<!DOCTYPE html>
<html>
<head><title>Update Password</title></head>
<body>
    <input type="password" id="new-password" placeholder="New password">
    <button id="update-btn">Update password</button>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient('https://nzenxdfumxrnsmybazmo.supabase.co', 'sb_publishable_K1uE4mTqb5q3OexAuKF91Q_xbHnlxwl');
        document.getElementById('update-btn').onclick = async () => {
            const newPassword = document.getElementById('new-password').value;
            const { error } = await supabase.auth.updateUser({ password: newPassword });
            if (error) alert(error.message);
            else alert('Password updated! You can now sign in.');
        };
    </script>
</body>
</html>
